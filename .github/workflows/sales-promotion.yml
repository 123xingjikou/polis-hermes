name: Sales Promotion - Social Media Outreach

on:
  schedule:
    # Twitter: 1-2 times daily (9:00 and 17:00 UTC)
    - cron: "0 9,17 * * *"
    # Reddit: 2-3 times weekly (Mon/Wed/Fri 10:00 UTC)
    - cron: "0 10 * * 1,3,5"
    # Hacker News: 1 time weekly (Tuesday 11:00 UTC)
    - cron: "0 11 * * 2"
  workflow_dispatch:
    inputs:
      platform:
        description: "Platform to promote on"
        required: true
        type: choice
        options:
          - twitter
          - reddit
          - hn
          - all
      action:
        description: "Action to perform"
        required: true
        type: choice
        options:
          - post
          - interact
          - analyze
          - calendar

env:
  PYTHON_VERSION: "3.11"
  PYTHONPATH: ${{ github.workspace }}

jobs:
  # =================================================================
  # Twitter Promotion (1-2x daily)
  # =================================================================
  twitter-job:
    name: Twitter Promotion
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.platform == 'twitter' ||
      github.event.inputs.platform == 'all' ||
      (github.event_name == 'schedule' && github.event.schedule == '0 9,17 * * *')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          playwright install chromium || true

      - name: Run Twitter promotion
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          TWITTER_USERNAME: ${{ secrets.TWITTER_USERNAME }}
          TWITTER_PASSWORD: ${{ secrets.TWITTER_PASSWORD }}
          TWITTER_EMAIL: ${{ secrets.TWITTER_EMAIL }}
          SALES_DRY_RUN: "false"
          SALES_PLATFORM: "twitter"
        run: |
          echo "=== Running Twitter Promotion ==="
          python -m monetization.sales.run promote --platform twitter --action ${{ github.event.inputs.action || 'post' }}

  # =================================================================
  # Reddit Promotion (2-3x weekly)
  # =================================================================
  reddit-job:
    name: Reddit Promotion
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.platform == 'reddit' ||
      github.event.inputs.platform == 'all' ||
      (github.event_name == 'schedule' && github.event.schedule == '0 10 * * 1,3,5')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          playwright install chromium || true

      - name: Run Reddit promotion
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REDDIT_USERNAME: ${{ secrets.REDDIT_USERNAME }}
          REDDIT_PASSWORD: ${{ secrets.REDDIT_PASSWORD }}
          REDDIT_CLIENT_ID: ${{ secrets.REDDIT_CLIENT_ID }}
          REDDIT_CLIENT_SECRET: ${{ secrets.REDDIT_CLIENT_SECRET }}
          SALES_DRY_RUN: "false"
          SALES_PLATFORM: "reddit"
        run: |
          echo "=== Running Reddit Promotion ==="
          python -m monetization.sales.run promote --platform reddit --action ${{ github.event.inputs.action || 'post' }}

  # =================================================================
  # Hacker News Promotion (1x weekly)
  # =================================================================
  hn-job:
    name: Hacker News Promotion
    runs-on: ubuntu-latest
    if: |
      github.event.inputs.platform == 'hn' ||
      github.event.inputs.platform == 'all' ||
      (github.event_name == 'schedule' && github.event.schedule == '0 11 * * 2')

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          playwright install chromium || true

      - name: Run Hacker News promotion
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          HN_USERNAME: ${{ secrets.HN_USERNAME }}
          HN_PASSWORD: ${{ secrets.HN_PASSWORD }}
          SALES_DRY_RUN: "false"
          SALES_PLATFORM: "hn"
        run: |
          echo "=== Running Hacker News Promotion ==="
          python -m monetization.sales.run promote --platform hn --action ${{ github.event.inputs.action || 'post' }}

  # =================================================================
  # Upload artifacts (always)
  # =================================================================
  upload-artifacts:
    name: Upload Analytics Artifacts
    needs: [twitter-job, reddit-job, hn-job]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Upload analytics report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: sales-analytics-${{ github.run_number }}
          path: |
            sales_analytics.db
            sales_report.json
          retention-days: 30
