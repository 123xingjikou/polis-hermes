name: CI/CD Pipeline

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:
    inputs:
      run_evaluation:
        description: "Run monetization evaluation"
        default: "true"

env:
  PYTHON_VERSION: "3.11"

jobs:
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install ruff mypy
      - run: ruff check . || true
      - run: ruff format --check . || true
      - run: mypy . || true

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: |
          pip install pytest pytest-cov
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
      - run: python -m pytest --cov=. --cov-report=term-missing -xvs || echo "No tests yet"

  evaluate-monetization:
    name: Run Monetization Evaluation
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'schedule' || github.event.inputs.run_evaluation == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: pip install -r requirements.txt 2>/dev/null || true
      - name: Run evaluation
        id: eval
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPO_OWNER: ${{ github.repository_owner }}
          GITHUB_REPO_NAME: ${{ github.event.repository.name }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          MONETIZATION_AGENT_MODE: "autonomous"
        run: |
          python -m monetization.engine report > report.txt
          cat report.txt
          if grep -q "START CHARGING" report.txt; then
            echo "decision=charge" >> $GITHUB_OUTPUT
          else
            echo "decision=wait" >> $GITHUB_OUTPUT
          fi
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: eval-results
          path: report.txt
      - name: Create issue if ready to charge
        if: steps.eval.outputs.decision == 'charge'
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: "Agent Decision: Ready to Start Charging",
              body: "The agent has determined the system is ready for monetization.",
              labels: ["monetization"]
            });

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [lint, test]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}
      - run: echo "Deploy step - add deployment commands here"
